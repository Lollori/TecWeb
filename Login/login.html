<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtAround | Accesso Portale</title>
    
    <!-- Bootstrap 5.2.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

    <div class="auth-wrapper d-flex align-items-center justify-content-center vh-100">
        
        <div class="auth-card card border-0">
            <div class="auth-body text-center">
                
                <div class="brand-header mb-4">
                    <h1 class="logo-text">ArtAround.</h1>
                    <div class="brand-accent"></div>
                </div>

                <h2 id="authTitle" class="mb-2">Crea Account</h2>
                <p id="authSubtitle" class="mb-5">Accedi per esplorare la tua collezione.</p>

                <form id="authForm" class="text-start">
                    
                    <!-- Sezione Ruolo con Avatar Testuale -->
                    <div id="roleField" class="mb-4">
                        <label class="form-label">Tipo di Account</label>
                        <div class="d-flex align-items-center gap-4">
                            <!-- Avatar con Lettera -->
                            <div id="avatarContainer" class="auth-avatar-container bg-visitatore">
                                <span id="avatarLetter">V</span>
                            </div>
                            
                            <!-- Tendina Navy -->
                            <select id="userRole" class="select-dark-navy w-100">
                                <option value="visitatore" selected>Visitatore</option>
                                <option value="curatore">Curatore</option>
                                <option value="autore">Autore</option>
                            </select>
                        </div>
                    </div>

                    <!-- Username -->
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group-custom">
                            <span class="prefix">@</span>
                            <input type="text" id="email" placeholder="es. visitatore1" required>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-5">
                        <label class="form-label">Password</label>
                        <div class="input-group-custom">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <button type="button" id="togglePassword" class="toggle-btn">
                                <i class="fa-regular fa-eye" id="togglePasswordIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-magenta-submit shadow-sm">
                        Registrati
                    </button>
                    
                    <div class="mt-4 text-center footer-links">
                        <p class="mb-2">
                            <a href="/"><i class="fa-solid fa-arrow-left me-1"></i> Torna alla home</a>
                        </p>
                        <p class="small mb-0">
                            Hai già un account? <a href="#" id="toggleAuthLink" class="text-magenta fw-bold">Accedi qui</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/login/login.js"></script>
</body>
</html>
