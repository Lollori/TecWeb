<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtAround | Accesso Portale</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-body">
                <div class="brand-icon">✦</div>
                <h2 id="authTitle">Bentornato!</h2>
                <p id="authSubtitle">Accedi per esplorare la tua collezione.</p>

                <form id="authForm">
                    <div class="form-grid">
                        <div id="roleField" style="display: none;">
                            <label>Tipo di Account</label>
                            <select id="userRole">
                                <option value="VIS">Visitatore (VIS_)</option>
                                <option value="CUR">Curatore (CUR_)</option>
                            </select>
                        </div>

                        <label>Email o Username</label>
                        <input type="text" id="email" placeholder="esempio@mail.it" required>

                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-submit">
                        <span id="submitBtnText">Accedi</span>
                    </button>
                    
                    <p class="toggle-text">
                        <span id="questionText">Non hai un account?</span> 
                        <a href="#" id="toggleAuthLink">Registrati ora</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script src="/login/login.js"></script>
</body>
</html>
