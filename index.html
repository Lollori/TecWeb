<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtAround | Scopri l'Arte</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 { font-size: 3rem; margin-bottom: 0.5rem; letter-spacing: 2px; }
        p { color: #aaa; margin-bottom: 3rem; }

        .container {
            display: flex;
            gap: 2rem;
        }

        .card {
            width: 280px;
            padding: 2rem;
            background: #252525;
            border: 1px solid #333;
            border-radius: 15px;
            text-align: center;
            transition: transform 0.3s, border-color 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #007bff;
            background: #2a2a2a;
        }

        .card h2 { margin-top: 0; color: #007bff; }
        .card p { font-size: 0.9rem; color: #888; margin-bottom: 1rem; }
    </style>
</head>
<body>

    <h1>ArtAround</h1>
    <p>Benvenuto nell'ecosistema digitale per l'arte</p>

    <div class="container">
        <a href="/navigator/index.html" class="card">
            <h2>Navigator</h2>
            <p>Esplora i musei e scopri nuove opere d'arte vicino a te.</p>
            <span>Entra →</span>
        </a>

        <a href="/editor/opere.html" class="card">
            <h2>Editor</h2>
            <p>Gestisci il tuo marketplace e carica le tue creazioni.</p>
            <span>Gestisci →</span>
        </a>
    </div>

</body>
</html>
