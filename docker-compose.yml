services:
  # Servizio Database
  mongo_site252630:
    image: mongo:latest
    container_name: mongo_site252630
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PWD}
      - MONGO_INITDB_DATABASE=${MONGO_SITE}
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # Servizio App Node.js (QUESTO MANCA!)
  app:
    build: .
    container_name: node_app_site
    ports:
      - "8000:8000"
    environment:
      - MONGO_USER=${MONGO_USER}
      - MONGO_PWD=${MONGO_PWD}
      - MONGO_SITE=mongo_site252630
    depends_on:
      - mongo_site252630

volumes:
  mongo_data: