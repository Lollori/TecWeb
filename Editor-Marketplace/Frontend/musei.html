<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Musei - ArtAround</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/editor.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>

<body class="admin-layout">

    <header class="app-header">
        <div class="header-inner">
        <div style="width: 38px;"></div>
        <h1 class="logo">
            <a href="/" class="logo-link">ArtAround</a>
            <span>Editor</span>
        </h1>

     <div id="nav-profile-placeholder"></div>
    </div>
</header>

    <nav class="top-nav-cards">
        <div class="nav-inner-glass">
            <a href="/" class="mini-card back-card"><i class="fa-solid fa-arrow-left"></i><span>Home</span></a>
        </div>
    </nav>

    <main class="main-viewport">
        <header class="content-header">
            <div class="header-text">
                <h1>Gestione dei musei</h1>
                <p>Cerca, modifica o aggiungi un nuovo museo</p>
            </div>

            <div class="header-toolbar">
                <div class="search-box-glass">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="searchMusei" placeholder="Cerca museo..." oninput="filterMusei()">
                </div>
                <!--<button onclick="openModal()" class="btn-primary-glass">
                    <i class="fa-solid fa-plus"></i> Nuovo Museo
                </button>
                -->
            </div>
        </header>

        <div id="museiContainer" class="items-grid"></div>
    </main>

    <div id="museoModal" class="modal-overlay" style="display:none;">
        <div class="modal-glass-card">
            <div class="modal-glass-header">
                <div class="brand" id="modalTitle">Nuovo <span>Museo</span></div>
                <button class="modal-close-btn" onclick="closeModal()" style="border:none; background:none; cursor:pointer; font-size:1.5rem; color:#4a7c5f;">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="modal-content">
                <form id="museoForm" onsubmit="submitForm(event)">
                    <input type="hidden" id="editIsil">
                    <input type="hidden" id="fCuratoreId">
                    <div class="form-grid">
                        <label>Nome *
                            <input type="text" id="fNome" placeholder="es. Museo Egizio" required>
                        </label>
                        <label>Città *
                            <input type="text" id="fCitta" placeholder="es. Torino" required>
                        </label>
                        <label class="full-width">Indirizzo
                            <input type="text" id="fIndirizzo" placeholder="es. Via Roma 1, 10100 Torino TO">
                        </label>
                        <label>Codice ISIL
                            <input type="text" id="fCodiceIsil" placeholder="es. IT-TO0576">
                        </label>
                        <label>URL immagine copertina
                            <input type="url" id="fImmagine" placeholder="https://...">
                        </label>
                        <label class="full-width">Descrizione breve
                            <textarea id="fDescrizione" rows="3" placeholder="Una breve descrizione del museo..."></textarea>
                        </label>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeModal()">Annulla</button>
                        <button type="submit" class="btn-submit" id="submitBtn">Salva Museo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="musei.js"></script>
    <script src="/js/profile.js"></script>
    
</body>
</html>
