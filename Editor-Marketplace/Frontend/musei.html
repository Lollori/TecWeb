<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>ArtAround - Selezione Museo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .search-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input[type="text"] { width: 70%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; background: #ddd; }
        .card-body { padding: 15px; }
        .card-title { font-size: 1.2rem; font-weight: bold; margin: 0 0 10px; color: #333; }
        .card-meta { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
        .badge { background: #e9ecef; padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; font-family: monospace; }
        .btn-select { display: block; width: 100%; text-align: center; padding: 10px; background: #28a745; color: white; text-decoration: none; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ArtAround Marketplace</h1>
    
    <div class="search-box">
        <form action="/musei/search" method="GET">
            <input type="text" name="nome" placeholder="Cerca un museo o una città..." value="<%= query %>">
            <button type="submit">Cerca</button>
        </form>
    </div>

    <h2>Risultati per: "{{query}}"</h2>

   <div class="grid">
    {{#each result}}
        <div class="card">
            <div class="card-body">
                <div class="card-title">{{nome}}</div>
                
                <a href="/editor/museo/{{_id}}" class="btn-select">Gestisci Contenuti</a>
            </div>
        </div>
    {{else}}
        <p>Nessun museo trovato. Prova a caricare i dati dal file JSON!</p>
    {{/each}}
    </div>
</div>

</body>
</html>
