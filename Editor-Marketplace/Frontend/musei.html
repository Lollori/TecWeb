<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Musei - ArtAround Admin</title>

    <!-- Bootstrap 5.2.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Nuovo CSS Unificato Marketplace/Admin -->
    <link rel="stylesheet" href="/css/marketplace.css">
</head>
<body>

<div class="admin-layout">
    
    <!-- SIDEBAR AGGIORNATA -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <h2 class="logo-brand">ArtAround.</h2>
            <p class="admin-badge">Management Panel</p>
        </div>

        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-link">
                <i class="fa-solid fa-chart-pie"></i> Dashboard
            </a>
            <a href="musei.html" class="menu-link active">
                <i class="fa-solid fa-museum"></i> Musei
            </a>
            <a href="utenti.html" class="menu-link">
                <i class="fa-solid fa-users-gears"></i> Utenti
            </a>
        </nav>

        <!-- NUOVO FOOTER SIDEBAR (Sostituisce il vecchio placeholder) -->
        <div class="sidebar-footer">
            <div class="user-pill-mini">
                <div class="avatar-sm">V</div>
                <div class="user-info-mini">
                    <span class="name">V. Locale</span>
                    <span class="role">Administrator</span>
                </div>
                <a href="/logout" class="ms-auto logout-icon" title="Logout">
                    <i class="fa-solid fa-power-off"></i>
                </a>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
        
        <!-- Header della Pagina -->
        <header class="content-header d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="page-title">Gestione Musei</h1>
                <p class="text-muted">Configura i partner e le istituzioni del network.</p>
            </div>
            <button onclick="openModal()" class="btn-magenta shadow-sm">
                <i class="fa-solid fa-plus me-2"></i>Nuovo Museo
            </button>
        </header>

        <!-- Barra di Ricerca Stile Premium -->
        <div class="toolbar-section mb-5">
            <div class="search-box-container shadow-sm">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchMusei" class="search-input" placeholder="Cerca museo per nome o città..." oninput="filterMusei()">
            </div>
        </div>

        <!-- Griglia Musei (Popolata da musei.js) -->
        <div id="museiContainer" class="items-grid">
            <!-- Verrà riempito dinamicamente -->
        </div>

    </main>
</div>

<!-- MODALE GESTIONE MUSEO -->
<div class="modal fade" id="museoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content custom-modal">
            <div class="modal-header">
                <h5 class="modal-title">Configurazione <span class="text-magenta">Museo</span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" onclick="closeModal()"></button>
            </div>
            <div class="modal-body p-4">
                <form id="museoForm" onsubmit="submitForm(event)">
                    <input type="hidden" id="editIsil">
                    
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label custom-label">Nome Istituzione</label>
                            <input type="text" id="fNome" class="form-control custom-input" placeholder="es. Galleria degli Uffizi" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label custom-label">Città</label>
                            <input type="text" id="fCitta" class="form-control custom-input" placeholder="es. Firenze" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label custom-label">Indirizzo Completo</label>
                            <input type="text" id="fIndirizzo" class="form-control custom-input" placeholder="Piazzale degli Uffizi, 6, 50122 Firenze FI">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label custom-label">Codice ISIL</label>
                            <input type="text" id="fCodiceIsil" class="form-control custom-input" placeholder="IT-FI0001">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label custom-label">Immagine Copertina (URL)</label>
                            <input type="url" id="fImmagine" class="form-control custom-input" placeholder="https://images.unsplash.com/...">
                        </div>
                    </div>

                    <div class="modal-actions mt-5">
                        <button type="button" class="btn-outline-custom" onclick="closeModal()">Annulla</button>
                        <button type="submit" class="btn-magenta" id="submitBtn">Salva Modifiche</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="musei.js"></script>
<!-- profile.js può rimanere per la logica, ma il CSS nasconderà l'iniettore automatico se presente -->
<script src="/js/profile.js"></script>

<script>
    function openModal() {
        const modal = new bootstrap.Modal(document.getElementById('museoModal'));
        modal.show();
    }
    function closeModal() {
        const modalEl = document.getElementById('museoModal');
        const modal = bootstrap.Modal.getInstance(modalEl);
        if (modal) modal.hide();
    }
</script>

</body>
</html>
