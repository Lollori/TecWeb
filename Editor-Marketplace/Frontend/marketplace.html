<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace — ArtAround</title>

    <!-- Bootstrap 5.2.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" defer></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/css/marketplace.css">

    <style>
        .card-opera-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px 12px 0 0;
        }

        .logistica-clamp {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tab-active {
            background: rgba(255, 0, 127, 0.15) !important;
            color: var(--magenta) !important;
        }
    </style>
</head>
<body>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-top">
             <a href="/" style="text-decoration: none;"><h2 class="logo-brand">ArtAround.</h2></a>
            <p class="admin-badge">Marketplace</p>
        </div>

        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-link">
                <i class="fa-solid fa-chart-pie"></i> Dashboard
            </a>
            <a href="musei.html" class="menu-link">
                <i class="fa-solid fa-museum"></i> Musei
            </a>
            <a href="utenti.html" class="menu-link">
                <i class="fa-solid fa-users-gear"></i> Utenti
            </a>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            <a href="#" class="menu-link" id="tabBtnOpere" onclick="event.preventDefault(); setTab('opere', this)">
                <i class="fa-solid fa-palette"></i> Opere
            </a>
            <a href="#" class="menu-link" id="tabBtnVisite" onclick="event.preventDefault(); setTab('visite', this)">
                <i class="fa-solid fa-map"></i> Visite
            </a>
            <a href="marketplace.html" class="menu-link active" id="tabBtnMarketplace">
                <i class="fa-solid fa-store"></i> Marketplace
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-pill-mini">
                <div class="avatar-sm">M</div>
                <div class="user-info-mini">
                    <span class="name">Marketplace</span>
                    <span class="role">Curatore</span>
                </div>
                <a href="/index.html" class="ms-auto logout-icon" title="Logout">
                    <i class="fa-solid fa-power-off"></i>
                </a>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-end mb-5">
            <div>
                <h1 class="page-title">Marketplace</h1>
                <p class="text-muted mb-0">Gestisci la vendita e l'adozione dei tuoi contenuti.</p>
            </div>
        </div>

        <!-- Filtro Museo -->
        <div class="toolbar-section mb-4">
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="search-box-container">
                        <i class="fa-solid fa-building-columns search-icon"></i>
                        <select id="museoFilter" class="search-input" onchange="applyFilter()">
                            <option value="">Tutti i musei</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab Opere -->
        <div id="tabOpere" class="items-grid">
            <!-- Riempito da marketplace.js -->
        </div>

        <!-- Tab Visite -->
        <div id="tabVisite" class="items-grid" style="display:none">
            <!-- Riempito da marketplace.js -->
        </div>

    </main>
</div>

<!-- MODAL: METTI IN VENDITA -->
<div class="modal fade" id="vendidaModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="custom-modal">
            <div class="modal-header">
                <h5 class="modal-title" id="vendidaTitle">Metti in <span class="text-magenta">Vendita</span></h5>
                <button type="button" class="btn-close btn-close-white" onclick="closeVendidaModal()"></button>
            </div>
            <div class="modal-body p-4">
                <form id="vendidaForm">
                    <div class="mb-3">
                        <label class="custom-label">Prezzo (€)</label>
                        <input type="number" id="vfPrezzo" class="custom-input" min="0" step="0.01" value="0">
                        <div class="form-text mt-1" style="font-size: 0.85rem; color: var(--text-muted);">Inserisci 0 per renderlo gratuito.</div>
                    </div>
                    <div class="mb-4 d-flex align-items-center gap-2">
                        <input type="checkbox" id="vfPubblica" class="form-check-input mt-0">
                        <label for="vfPubblica" class="form-check-label" style="font-size: 0.9rem;">Rendi pubblicamente disponibile</label>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-outline-custom" onclick="closeVendidaModal()">Annulla</button>
                        <button type="submit" class="btn-magenta">
                            <i class="fa-solid fa-tag me-1"></i> Conferma
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="marketplace.js"></script>
<script src="/js/profile.js"></script>



</body>
</html>
