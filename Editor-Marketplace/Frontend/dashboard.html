<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — ArtAround Admin</title>

    <!-- Bootstrap 5.2.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS Unificato Marketplace/Admin -->
    <link rel="stylesheet" href="/css/marketplace.css">
</head>
<body>

<div class="admin-layout">
    
    <!-- SIDEBAR AGGIORNATA -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <h2 class="logo-brand">ArtAround.</h2>
            <p class="admin-badge" id="sidebarRole">Dashboard</p>
        </div>

        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-link active">
                <i class="fa-solid fa-chart-pie"></i> Dashboard
            </a>
            <a href="musei.html" class="menu-link">
                <i class="fa-solid fa-museum"></i> Musei
            </a>
            <a href="utenti.html" class="menu-link">
                <i class="fa-solid fa-users-gears"></i> Utenti
            </a>
        </nav>

        <!-- FOOTER SIDEBAR STATICO (Addio vecchio menu verde) -->
        <div class="sidebar-footer">
            <div class="user-pill-mini">
                <div class="avatar-sm">V</div>
                <div class="user-info-mini">
                    <span class="name">V. Locale</span>
                    <span class="role" id="headerRoleLabel">Administrator</span>
                </div>
                <a href="/logout" class="ms-auto logout-icon" title="Logout">
                    <i class="fa-solid fa-power-off"></i>
                </a>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="main-content">
        
        <!-- HEADER DINAMICO -->
        <header class="content-header d-flex justify-content-between align-items-end mb-5">
            <div>
                <h1 class="page-title">Pannello di Controllo</h1>
                <p class="text-muted mb-0">Benvenuto nell'area di gestione globale.</p>
            </div>
            <div class="quick-stats d-flex gap-4">
                <div class="stat-item text-end">
                    <span class="d-block fw-bold h4 mb-0 text-magenta">24</span>
                    <small class="text-muted">Musei Attivi</small>
                </div>
            </div>
        </header>

        <!-- SEZIONE: GESTIONE RAPIDA (Eredita lo stile card dal CSS) -->
        <section id="section-musei" class="dashboard-section mb-5">
            <div class="section-header-inline d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold h4 mb-0">I tuoi Musei</h3>
                <div class="d-flex gap-2">
                    <div class="search-box-container shadow-sm py-1 px-3" style="max-width: 300px;">
                        <i class="fa-solid fa-magnifying-glass search-icon" style="font-size: 0.9rem;"></i>
                        <input type="text" id="searchMuseiDash" class="search-input py-2" placeholder="Cerca..." oninput="filterMuseiDash()">
                    </div>
                    <button class="btn-magenta" onclick="switchSection('aggiungi-museo')">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </div>
            
            <div id="museiView" class="items-grid">
                <!-- Popolato da dashboard.js -->
            </div>
        </section>

        <!-- SEZIONE: MODIFICA MUSEO (Stile Custom Modal in pagina) -->
        <section id="section-modifica-museo" class="dashboard-section mb-5" style="display:none">
            <div class="custom-card-bg p-4 shadow-sm">
                <h3 class="mb-4 h4 fw-bold text-navy">Modifica Istituzione</h3>
                <div class="mb-4">
                    <label class="custom-label">Seleziona Museo</label>
                    <select id="selectModifica" class="form-control custom-input bg-white">
                        <option value="">— Seleziona —</option>
                    </select>
                </div>

                <form id="modificaForm" style="display:none" class="row g-4">
                    <div class="col-md-6">
                        <label class="custom-label">Nome</label>
                        <input type="text" id="mfNome" class="form-control custom-input" required>
                    </div>
                    <div class="col-md-6">
                        <label class="custom-label">Città</label>
                        <input type="text" id="mfCitta" class="form-control custom-input" required>
                    </div>
                    <div class="col-12">
                        <label class="custom-label">Indirizzo</label>
                        <input type="text" id="mfIndirizzo" class="form-control custom-input">
                    </div>
                    <div class="col-md-4">
                        <label class="custom-label">Codice ISIL</label>
                        <input type="text" id="mfCodiceIsil" class="form-control custom-input">
                    </div>
                    <div class="col-md-8">
                        <label class="custom-label">URL Copertina</label>
                        <input type="url" id="mfImmagine" class="form-control custom-input">
                    </div>
                    <div class="col-12">
                        <label class="custom-label">Descrizione</label>
                        <textarea id="mfDescrizione" class="form-control custom-input" rows="3"></textarea>
                    </div>
                    <div class="col-12 mt-4 text-end">
                        <button type="submit" class="btn-magenta px-5">Aggiorna Dati</button>
                    </div>
                </form>
            </div>
        </section>

    </main>
</div>

<script src="dashboard.js"></script>
<script src="/js/profile.js"></script>
</body>
</html>
