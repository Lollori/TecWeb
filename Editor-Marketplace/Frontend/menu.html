<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArtAround - Editor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="admin-layout">

  <header class="app-header">
    <div class="header-inner">
      <div style="width: 38px;"></div>
      <h1 class="logo">ArtAround <span>Editor</span></h1>
      <button class="user-icon-btn" type="button" onclick="window.location.href='/'">
        <i class="fa-solid fa-right-from-bracket"></i>
      </button>
    </div>
  </header>

  <main>
    <div class="hero-text">
      <div class="badge">Pannello di controllo</div>
      <h1>Gestisci i contenuti</h1>
      <p>Musei, visite, opere e utenti — tutto in un posto</p>
    </div>

    <nav id="menu-grid">
      <a href="/Editor-Marketplace/Frontend/musei.html" class="nav-card">
        <div class="icon-wrap"><i class="fa-solid fa-landmark"></i></div>
        <span class="label">Musei</span>
        <span class="card-desc">Gestisci i musei disponibili</span>
        <div class="card-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      </a>

      <a href="/Editor-Marketplace/Frontend/visite.html" class="nav-card">
        <div class="icon-wrap"><i class="fa-solid fa-map"></i></div>
        <span class="label">Visite</span>
        <span class="card-desc">Crea e organizza percorsi</span>
        <div class="card-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      </a>

      <a href="/Editor-Marketplace/Frontend/opere.html" class="nav-card">
        <div class="icon-wrap"><i class="fa-solid fa-palette"></i></div>
        <span class="label">Opere</span>
        <span class="card-desc">Aggiungi e modifica le opere</span>
        <div class="card-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      </a>

      <a href="/Editor-Marketplace/Frontend/users.html" class="nav-card">
        <div class="icon-wrap"><i class="fa-solid fa-user-pen"></i></div>
        <span class="label">Utenti</span>
        <span class="card-desc">Gestisci account e permessi</span>
        <div class="card-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      </a>
    </nav>
  </main>


  <script src="menu.js"></script>
</body>
</html>
