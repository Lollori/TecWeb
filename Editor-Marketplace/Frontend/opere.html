<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Opere - ArtAround</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Playpen+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/opere.css">
    <link rel="stylesheet" href="/css/visite.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="admin-layout">

    <header class="app-header">
        <div class="header-inner">
        <div style="width: 38px;"></div>
        <h1 class="logo">
            <a href="/" class="logo-link">ArtAround</a>
            <span>Editor</span>
            </h1>
        <button class="user-icon-btn" type="button" onclick="window.location.href='/'">
            <i class="fa-solid fa-right-from-bracket"></i>
        </button>
        </div>
    </header>

    <nav class="top-nav-cards">
        <div class="nav-inner-glass">
            <!--<a href="/" class="mini-card"><i class="fa-solid fa-house"></i><span>Home</span></a> -->
            <!-- <a href="menu.html" class="mini-card"><i class="fa-solid fa-table-columns"></i><span>Menu</span></a> -->
            <a href="musei.html" class="mini-card"><i class="fa-solid fa-landmark"></i><span>Musei</span></a>
            <a href="opere.html" class="mini-card active"><i class="fa-solid fa-palette"></i><span>Opere</span></a>
            <a href="visite.html" class="mini-card"><i class="fa-solid fa-map"></i><span>Visite</span></a>
            <a href="utenti.html" class="mini-card"><i class="fa-solid fa-user-pen"></i><span>Utenti</span></a>

        </div>
    </nav>

   <main class="main-viewport">
    <header class="content-header">
        <div class="header-text">
            <h1>Gestione delle opere</h1>
            <p>Configura i contenuti multimediali del catalogo</p>
        </div>
        
        <div class="header-toolbar">
            <div class="filter-toggle-container">
                <button id="filterMie" class="filter-btn active" onclick="setFilter('mie')">
                    <i class="fa-solid fa-user-gear"></i> Le mie opere
                </button>
                <button id="filterTutte" class="filter-btn" onclick="setFilter('tutte')">
                    <i class="fa-solid fa-globe"></i> Marketplace
                </button>
            </div>

            <div class="select-wrapper-glass">
                <select id="filterPrezzo" onchange="applyFilters()">
                    <option value="tutti">Tutti i prezzi</option>
                    <option value="gratuiti">Solo gratuiti</option>
                    <option value="pagamento">A pagamento</option>
                </select>
                <i class="fa-solid fa-chevron-down select-icon"></i>
            </div>

            <div class="search-box-glass">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchText" placeholder="Cerca opera..." oninput="applyFilters()">
            </div>

            <button onclick="apriModaleItem()" class="btn-primary-glass">
                <i class="fa-solid fa-plus"></i> Nuovo Item
            </button>
        </div>
    </header>

    
    <div id="statsDashboard" class="stats-dashboard-container">
            <div class="stat-card">
                <h3>Successo Opere (Adozioni)</h3>
                <div class="chart-container">
                    <canvas id="chartAdozioni"></canvas>
                </div>
            </div>
            <div class="stat-card">
                <h3>Distribuzione Ricavi</h3>
                <div class="chart-container">
                    <canvas id="chartRicavi"></canvas>
                </div>
            </div>
        </div>  
    <div id="itemsContainer" class="items-grid"></div>
</main>

<div id="itemModal" class="modal-overlay" style="display:none;">
    <div class="modal-glass-card">
        <div class="modal-glass-header">
            <div class="brand">ArtAround <span>Editor</span></div>
            <button class="modal-close-btn" onclick="closeModal()" style="border:none; background:none; cursor:pointer; font-size:1.5rem; color:#4a7c5f;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="modal-content">
            <form id="itemForm">
                <div class="form-grid">
                    <label>Titolo dell'Opera *
                        <input type="text" id="operaId" placeholder="Es: La Primavera" required>
                    </label>
                    <label>Museo / Collezione *
                        <input type="text" id="museo" placeholder="Es: Uffizi" required>
                    </label>
                    <label>Lunghezza *
                        <select id="lunghezza" required>
                            <option value="3s">3s</option>
                            <option value="15s">15s</option>
                            <option value="1min">1min</option>
                        </select>
                    </label>
                    <label>Linguaggio *
                        <select id="linguaggio" required>
                            <option value="infantile">Infantile</option>
                            <option value="medio">Medio</option>
                            <option value="specialistico">Specialistico</option>
                        </select>
                    </label>
                    <label class="full-width">Testo Descrittivo *
                        <textarea id="testo" rows="4" placeholder="Inserisci qui la descrizione..." required></textarea>
                    </label>
                    
                    <!-- NUOVI CAMPI MARKETPLACE -->
                    <label>Licenza *
                        <select id="licenza" required>
                            <option value="gratuita">Gratuita</option>
                            <option value="cc-by">CC-BY</option>
                            <option value="pagamento">A pagamento</option>
                        </select>
                    </label>
                    <label>Prezzo (€)
                        <input type="number" id="prezzo" step="0.01" min="0" value="0" placeholder="0 per gratuito">
                    </label>
                    <label class="checkbox-row">
                        <input type="checkbox" id="pubblica"> Pubblica sul marketplace
                    </label>
                </div>
                
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Annulla</button>
                    <button type="submit" class="btn-submit">Salva</button>
                </div>
            </form>
        </div>
    </div>
</div>


<script src="item.js"></script>

</body>
</html>
