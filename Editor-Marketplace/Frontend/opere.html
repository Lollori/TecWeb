<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Opere - ArtAround</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="/TecWeb/public/css/styles.css">
    <link rel="stylesheet" href="/TecWeb/public/css/opere.css">
</head>
<body class="admin-layout">

    <nav class="top-nav-cards">
        <div class="nav-inner-glass">
            <a href="index.html" class="mini-card"><i class="fa-solid fa-house"></i><span>Home</span></a>
            <a href="musei.html" class="mini-card"><i class="fa-solid fa-landmark"></i><span>Musei</span></a>
            <a href="visite.html" class="mini-card"><i class="fa-solid fa-map"></i><span>Visite</span></a>
            <a href="opere.html" class="mini-card active"><i class="fa-solid fa-palette"></i><span>Opere</span></a>
            <a href="utenti.html" class="mini-card"><i class="fa-solid fa-user-pen"></i><span>Utenti</span></a>
        </div>
    </nav>

    <main class="main-viewport">
        <header class="content-header">
            <div class="header-text">
                <h1>Gestione delle opere</h1>
                <p>Configura i contenuti multimediali del catalogo</p>
            </div>
            
            <div class="header-toolbar">
                <div class="search-box-glass">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchText" placeholder="Cerca opera...">
                </div>
                <button onclick="openModal()" class="btn-primary-glass">
                    <i class="fa-solid fa-plus"></i> Nuovo Item
                </button>
            </div>
        </header>

        <div id="itemsContainer" class="items-grid"></div>
    </main>

    <div id="itemModal" class="modal-overlay" style="display:none;">
        <div class="modal-glass-card">
            <div class="modal-glass-header">
                <button class="modal-close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="modal-content">
                <form id="itemForm">
                    <div class="form-grid">
                        <label>Titolo dell'Opera *
                            <input type="text" id="operaId" placeholder="Es: La Primavera" required>
                        </label>
                        <label>Museo / Collezione *
                            <input type="text" id="museo" placeholder="Es: Uffizi" required>
                        </label>
                        <label>Lunghezza *
                            <select id="lunghezza" required>
                                <option value="3s">3s</option>
                                <option value="15s">15s</option>
                                <option value="1min">1min</option>
                            </select>
                        </label>
                        <label>Linguaggio *
                            <select id="linguaggio" required>
                                <option value="infantile">Infantile</option>
                                <option value="medio">Medio</option>
                                <option value="specialistico">Specialistico</option>
                            </select>
                        </label>
                        <label class="full-width">Testo Descrittivo *
                            <textarea id="testo" rows="4" placeholder="Inserisci qui la descrizione..." required></textarea>
                        </label>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeModal()">Annulla</button>
                        <button type="submit" class="btn-submit">Crea</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- <script src="/public/scripts/item.js"></script> -->
    <!--<script src="/public/scripts/menu.js"></script> -->
 <script>
  document.addEventListener('DOMContentLoaded', () => {
    // Selettore corretto: .mini-card invece di .nav-card
    const navCards = document.querySelectorAll('.mini-card');
    
    // Logica per gestire il click (utile se usassi AJAX, 
    // ma con i link normali serve a poco se la pagina si ricarica)
    navCards.forEach(link => {
      link.addEventListener('click', (e) => {
        // Rimuoviamo active da tutti
        navCards.forEach(l => l.classList.remove('active'));
        // Aggiungiamo active a quello cliccato
        link.classList.add('active');
      });
    });

    // EXTRA: Evidenzia automaticamente il link in base all'URL corrente
    const currentPath = window.location.pathname.split("/").pop();
    navCards.forEach(link => {
      if (link.getAttribute('href') === currentPath) {
        link.classList.add('active');
      }
    });
  });
</script>

  <script>
// Database locale temporaneo (Array semplice)
let currentItems = JSON.parse(localStorage.getItem('artAroundItems')) || [];

let editingId = null;

// Carica e filtra gli item dall'array locale
function loadItems() {
    const museoFiltro = document.getElementById('filterMuseo')?.value || '';
    const searchFiltro = document.getElementById('searchText')?.value.toLowerCase() || '';

    const filtered = currentItems.filter(item => {
        const matchesMuseo = museoFiltro === '' || item.museo === museoFiltro;
        const matchesSearch = item.operaId.toLowerCase().includes(searchFiltro) || 
                              item.testo.toLowerCase().includes(searchFiltro);
        return matchesMuseo && matchesSearch;
    });

    renderItems(filtered);
}

// Genera le card nella pagina
function renderItems(data = currentItems) {
    const container = document.getElementById('itemsContainer');
    if (!container) return;
    
    container.innerHTML = '';
    
    if (data.length === 0) {
        container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #4a7c5f;">Nessuna opera trovata.</p>';
        return;
    }
    
    data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'item-card'; // Usa il tuo stile CSS glass
        card.innerHTML = `
            <div class="item-header" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <h3 style="color: #2d5a3d;">${item.operaId}</h3>
                <div class="item-actions">
                    <button onclick="editItem('${item.id}')" style="border:none; background:none; cursor:pointer; color:#2d5a3d;"><i class="fa-solid fa-pen"></i></button>
                    <button onclick="deleteItem('${item.id}')" style="border:none; background:none; cursor:pointer; color:#be123c;"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <p style="font-size: 0.85rem; color: #4a7c5f; margin-bottom: 15px;">${item.testo}</p>
            <div class="tags" style="display: flex; gap: 5px;">
                <span class="badge" style="background:#cfe5d2; padding:3px 8px; border-radius:5px; font-size:0.7rem;">${item.linguaggio}</span>
                <span class="badge" style="background:#cfe5d2; padding:3px 8px; border-radius:5px; font-size:0.7rem;">${item.lunghezza}</span>
            </div>
        `;
        container.appendChild(card);
    });
}

// Funzioni Modale
function openModal(id = null) {
    editingId = id;
    const modal = document.getElementById('itemModal');
    const form = document.getElementById('itemForm');
    
    if (id) {
        const item = currentItems.find(i => i.id === id);
        if (item) {
            document.getElementById('operaId').value = item.operaId;
            document.getElementById('museo').value = item.museo;
            document.getElementById('lunghezza').value = item.lunghezza;
            document.getElementById('linguaggio').value = item.linguaggio;
            document.getElementById('testo').value = item.testo;
        }
    } else {
        form.reset();
    }
    modal.style.display = 'flex';
}

function closeModal() {
    document.getElementById('itemModal').style.display = 'none';
    editingId = null;
}

// CRUD 
function deleteItem(id) {
    if (confirm('Eliminare?')) {
        currentItems = currentItems.filter(i => i.id !== id);
        loadItems();
    }
}

function editItem(id) {
    openModal(id);
}

// Inizializzazione
document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('itemForm');
    
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const data = {
            id: editingId || Date.now().toString(), // Genera ID finto
            operaId: document.getElementById('operaId').value,
            museo: document.getElementById('museo').value,
            lunghezza: document.getElementById('lunghezza').value,
            linguaggio: document.getElementById('linguaggio').value,
            testo: document.getElementById('testo').value
        };

        if (editingId) {
            const index = currentItems.findIndex(i => i.id === editingId);
            currentItems[index] = data;
        } else {
            currentItems.push(data);
        }

        closeModal();
        loadItems();
    });

    // Filtri live
    document.getElementById('searchText')?.addEventListener('input', loadItems);
    document.getElementById('filterMuseo')?.addEventListener('change', loadItems);

    loadItems();
});


  </script>

</body>
</html>
