<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Opere - ArtAround</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/editor.css">
    <link rel="stylesheet" href="/css/profile.css">

</head>
<body class="admin-layout">

    <header class="app-header">
        <div class="header-inner">
        <div style="width: 38px;"></div>
        <h1 class="logo">
            <a href="/" class="logo-link">ArtAround</a>
            <span>Editor</span>
        </h1>

            <div id="nav-profile-placeholder"></div>
        </div>
</header>
    <nav class="top-nav-cards">
        <div class="nav-inner-glass">
            <a href="musei.html" class="mini-card back-card"><i class="fa-solid fa-arrow-left"></i><span>Musei</span></a>
            <a href="opere.html" class="mini-card active"><i class="fa-solid fa-palette"></i><span>Opere</span></a>
            <a href="visite.html" class="mini-card"><i class="fa-solid fa-map"></i><span>Visite</span></a>
            <a href="marketplace.html" class="mini-card"><i class="fa-solid fa-store"></i><span>Marketplace</span></a>
        </div>
    </nav>

 <main class="main-viewport">
        <header class="content-header">
            <div class="header-text">
                <h1>Gestione delle opere</h1>
                <p id="museoSubtitle">Configura i contenuti multimediali (Item) del catalogo </p>
            </div>
            
            <div class="header-toolbar">
                <div class="search-box-glass">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="searchText" placeholder="Cerca tra i tuoi contenuti..." oninput="applyFilters()">
                </div>

                <button onclick="apriModaleItem()" class="btn-primary-glass">
                    <i class="fa-solid fa-plus"></i> Nuovo Item
                </button>
            </div>
        </header>

        <div id="statsDashboard" class="stats-sidebar">
            <div class="mini-stat-card">
                <div class="stat-ring-container" id="ringAdozioni"></div>
                <div class="stat-texts">
                    <small>Adozioni</small>
                    <strong id="valAdozioni">0</strong>
                </div>
            </div>
            <div class="mini-stat-card">
                <div class="stat-texts">
                    <small>Stato Sistema</small>
                    <strong style="color: #4a7c5f;">Online</strong>
                </div>
            </div>
        </div>

        <div id="itemsContainer" class="items-grid"></div>
    </main>

    <div id="itemModal" class="modal-overlay" style="display:none;">
        <div class="modal-glass-card">
            <div class="modal-glass-header">
                <div class="brand">ArtAround <span>Editor</span></div>
                <button class="modal-close-btn" onclick="closeModal()">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="modal-content">
                <form id="itemForm">
                    <div class="form-grid">
                        <label>Titolo dell'Opera / Oggetto *
                            <input type="text" id="operaId" placeholder="Es: Il Cenacolo" required>
                        </label>
                        
                        <label>Identificatore (es. Wikidata ID)
                            <input type="text" id="wikidataId" placeholder="Es: Q12345">
                        </label>

                        <label>Lunghezza *
                            <select id="lunghezza" required>
                                <option value="15s">15 secondi </option>
                                <option value="1min">1 minuto </option>
                                <option value="4min">4 minuti </option>
                            </select>
                        </label>

                        <label>Linguaggio *
                            <select id="linguaggio" required>
                                <option value="infantile">Infantile [cite: 2, 3]</option>
                                <option value="medio">Medio / Divulgativo [cite: 2, 3]</option>
                                <option value="specialistico">Specialistico [cite: 2, 3]</option>
                            </select>
                        </label>

                        <label class="full-width">Testo per Audioguida *
                            <textarea id="testo" rows="6" placeholder="Inserisci il testo per l'App Navigator..." required></textarea>
                        </label>
                    </div>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeModal()">Annulla</button>
                        <button type="submit" class="btn-submit">Salva Contenuto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>


<script src="item.js"></script>
<script src="/js/profile.js"></script>

</body>
</html>
