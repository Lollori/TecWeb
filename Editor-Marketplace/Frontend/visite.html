<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Visite - ArtAround</title>

    <!-- Bootstrap 5.2.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/css/marketplace.css">
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.dataset.theme=t;})();</script>

    <style>
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .item-card-custom {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .item-card-custom:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(255, 0, 127, 0.12);
        }

        .item-card-body {
            padding: 20px;
        }

        .item-card-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .text-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .border-dashed {
            border-style: dashed !important;
        }
    </style>
</head>
<body>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-top">
             <a href="/" style="text-decoration: none;"><h2 class="logo-brand">ArtAround.</h2></a>
            <p class="admin-badge">Editor Percorsi</p>
        </div>

        <nav class="sidebar-menu">
            <a href="musei.html" class="menu-link">
                <i class="fa-solid fa-arrow-left"></i> Musei
            </a>
            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            <a href="opere.html" class="menu-link">
                <i class="fa-solid fa-palette"></i> Opere
            </a>
            <a href="visite.html" class="menu-link active">
                <i class="fa-solid fa-map"></i> Visite
            </a>
            <a href="marketplace.html" class="menu-link">
                <i class="fa-solid fa-store"></i> Marketplace
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-pill-mini">
                <div class="avatar-sm">V</div>
                <div class="user-info-mini">
                    <span class="name">Editor Visite</span>
                    <span class="role">Curatore</span>
                </div>
                <a href="/index.html" class="ms-auto logout-icon" title="Logout">
                    <i class="fa-solid fa-power-off"></i>
                </a>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="page-title">Gestione delle Visite</h1>
                <p class="text-muted mb-0">Cerca, modifica o crea un nuovo percorso per i visitatori</p>
            </div>
            <button onclick="openModal()" class="btn-magenta">
                <i class="fa-solid fa-plus me-2"></i>Nuova Visita
            </button>
        </div>

        <!-- Toolbar: Search -->
        <div class="toolbar-section mb-4">
            <div class="search-box-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchVisite" class="search-input" placeholder="Cerca visita per nome..." oninput="filterVisite()">
            </div>
        </div>

        <!-- Contenitore Dinamico Visite -->
        <div id="visiteContainer" class="items-grid">
            <!-- Verrà riempito dinamicamente da visite.js -->
        </div>

    </main>
</div>

<!-- MODAL: DETTAGLI VISITA (Bootstrap Version) -->
<div class="modal fade" id="visitaModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content custom-modal" style="border: none;">
            <div class="modal-header">
                <h5 class="modal-title">Dettagli <span class="text-magenta">Visita</span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" onclick="closeModal()"></button>
            </div>
            <div class="modal-body p-4">
                <form id="visitaForm">
                    <div class="row g-3">
                        <div class="col-md-7">
                            <label class="custom-label">Nome della Visita *</label>
                            <input type="text" id="nomeVisita" class="custom-input" placeholder="Es: Capolavori del Rinascimento" required>
                        </div>
                        <div class="col-md-5">
                            <label class="custom-label">Nome Mnemonico</label>
                            <input type="text" id="nomeMnemonico" class="custom-input" placeholder="Es: Fenice rossa">
                        </div>
                        <div class="col-12">
                            <label class="custom-label">Indicazioni Logistiche *</label>
                            <textarea id="logistica" class="custom-input" rows="3" placeholder="Es: L'entrata del museo è da via Garibaldi 2..." required></textarea>
                        </div>

                        <!-- Sequenza Opere -->
                        <div class="col-12 mt-4">
                            <label class="custom-label d-block mb-2">Sequenza Opere</label>
                            <div id="lista-opere" class="bg-light p-3 rounded-3 border border-dashed mb-2">
                                <!-- Elementi aggiunti da aggiungiOpera() -->
                            </div>
                            <button type="button" class="btn-outline-custom btn-sm mt-2" onclick="aggiungiOpera()">
                                <i class="fa-solid fa-plus me-1"></i> Aggiungi Opera
                            </button>
                        </div>

                        <!-- Quiz Section -->
                        <div class="col-12 mt-4">
                            <div class="p-3 bg-light rounded-3 border border-info border-opacity-25">
                                <label class="custom-label"><i class="fa-solid fa-lightbulb me-2"></i>Quiz Finale (Estensione 18-27)</label>
                                <input type="text" id="quizDomanda" class="custom-input" placeholder="Inserisci qui la domanda del quiz finale...">
                            </div>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-outline-custom" onclick="closeModal()">Annulla</button>
                        <button type="submit" class="btn-magenta">Salva Visita</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="visite.js"></script>
<script src="/js/profile.js"></script>



</body>
</html>
