<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Utenti - ArtAround</title>

    <!-- Bootstrap 5.2.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="/css/marketplace.css">
    <script>(function(){var t=localStorage.getItem('theme')||'light';document.documentElement.dataset.theme=t;})();</script>
</head>
<body>

<div class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-top">
            <a href="/" style="text-decoration: none;"><h2 class="logo-brand">ArtAround.</h2></a>
            <p class="admin-badge">Dashboard Curatore</p>
        </div>

        <nav class="sidebar-menu">
            <a href="dashboard.html" class="menu-link">
                <i class="fa-solid fa-building-columns"></i> Musei
            </a>
            <a href="dashboard.html?s=modifica-museo" class="menu-link">
                <i class="fa-solid fa-pen-to-square"></i> Modifica Museo
            </a>
            <a href="dashboard.html?s=aggiungi-opere" class="menu-link">
                <i class="fa-solid fa-image"></i> Aggiungi Opera
            </a>
            <a href="dashboard.html?s=aggiungi-museo" class="menu-link">
                <i class="fa-solid fa-plus-circle"></i> Aggiungi Museo
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-pill-mini">
                <div class="avatar-sm">U</div>
                <div class="user-info-mini">
                    <span class="name">Admin</span>
                    <span class="role">Administrator</span>
                </div>
                <a href="/login/login.html" class="ms-auto logout-icon" title="Logout"
                   onclick="localStorage.clear()">
                    <i class="fa-solid fa-power-off"></i>
                </a>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- Page Header -->
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="page-title">Gestione Utenti</h1>
                <p class="text-muted mb-0">Gestisci i permessi e i ruoli degli utenti registrati</p>
            </div>
            <button class="btn-magenta" onclick="openModal()">
                <i class="fa-solid fa-plus me-2"></i>Nuovo Utente
            </button>
        </div>

        <!-- Toolbar: Search -->
        <div class="toolbar-section mb-4">
            <div class="search-box-container">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" class="search-input" placeholder="Cerca utente per nome o ruolo...">
            </div>
        </div>

        <!-- Users Table -->
        <div class="glass-card p-4">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th scope="col">Utente</th>
                        <th scope="col">Ruolo</th>
                        <th scope="col">Stato</th>
                        <th scope="col">Azioni</th>
                    </tr>
                </thead>
                <tbody id="utentiTableBody">
                    <tr><td colspan="4" class="text-center text-muted py-4"><i class="fa-solid fa-spinner fa-spin me-2"></i>Caricamento...</td></tr>
                </tbody>
            </table>
        </div>

    </main>
</div>

<!-- MODAL: NUOVO UTENTE -->
<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content custom-modal" style="border: none;">
            <div class="modal-header">
                <h5 class="modal-title">Nuovo <span class="text-magenta">Utente</span></h5>
                <button type="button" class="btn-close btn-close-white" onclick="closeModal()"></button>
            </div>
            <div class="modal-body p-4">
                <form id="userForm">
                    <div class="mb-3">
                        <label class="custom-label">Username *</label>
                        <input type="text" id="ufUsername" class="custom-input" placeholder="es. nuovo_utente" required>
                    </div>
                    <div class="mb-3">
                        <label class="custom-label">Email</label>
                        <input type="email" id="ufEmail" class="custom-input" placeholder="es. user@example.com">
                    </div>

                    <div class="mb-3">
                        <label class="custom-label">Ruolo</label>
                        <select id="ufRuolo" class="custom-input">
                            <option value="visitatore">Visitatore</option>
                            <option value="curatore">Curatore</option>
                            <option value="autore">Autore</option>
                        </select>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-outline-custom" onclick="closeModal()">Annulla</button>
                        <button type="submit" class="btn-magenta">Crea Utente</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const modalEl = document.getElementById('userModal');
    const bsModal = new bootstrap.Modal(modalEl);

    function openModal() {
        document.getElementById('userForm').reset();
        bsModal.show();
    }
    function closeModal() {
        bsModal.hide();
    }

    // --- Load and render users ---
    const ROLE_COLORS = {
        curatore: '#6366f1',
        autore: '#f59e0b',
        visitatore: '#e91e8e'
    };

    async function loadUtenti() {
        const tbody = document.getElementById('utentiTableBody');
        try {
            const res = await fetch('/api/utenti');
            const data = await res.json();
            if (!data.ok || !data.data.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-4">Nessun utente trovato.</td></tr>';
                return;
            }
            allUtenti = data.data;
            renderUtenti(allUtenti);
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="4" class="text-center text-danger py-4">Errore nel caricamento degli utenti.</td></tr>';
        }
    }

    let allUtenti = [];

    function renderUtenti(lista) {
        const tbody = document.getElementById('utentiTableBody');
        tbody.innerHTML = lista.map(u => {
            const initial = (u.username || '?')[0].toUpperCase();
            const color = ROLE_COLORS[u.ruolo] || '#6b7280';
            const badgeClass = u.ruolo === 'curatore' ? 'bg-primary'
                             : u.ruolo === 'autore'   ? 'bg-warning text-dark'
                             : 'bg-magenta';
            return `
                <tr>
                    <td>
                        <div class="d-flex align-items-center gap-3">
                            <div class="avatar-sm" style="background: ${color};">${initial}</div>
                            <div>
                                <div class="fw-bold">${u.username}</div>
                                <small class="text-muted">${u.userId || ''}</small>
                            </div>
                        </div>
                    </td>
                    <td><span class="badge ${badgeClass}">${u.ruolo}</span></td>
                    <td><span class="badge bg-success">Attivo</span></td>
                    <td>
                        <button class="btn-outline-custom btn-sm" onclick="deleteUtente('${u._id}', '${u.username}')">Elimina</button>
                    </td>
                </tr>`;
        }).join('');
    }

    // --- Search filter ---
    document.querySelector('.search-input').addEventListener('input', function() {
        const q = this.value.toLowerCase();
        const filtered = allUtenti.filter(u =>
            u.username.toLowerCase().includes(q) || u.ruolo.toLowerCase().includes(q)
        );
        renderUtenti(filtered);
    });

    // --- Create user ---
    document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const body = {
            username: document.getElementById('ufUsername').value.trim(),
            password: '12345678',
            ruolo:    document.getElementById('ufRuolo').value
        };

        if (!body.username) {
            alert('Username è obbligatorio.');
            return;
        }

        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await res.json();
            if (data.success) {
                closeModal();
                loadUtenti();
            } else {
                alert('Errore: ' + (data.message || 'Creazione fallita.'));
            }
        } catch (err) {
            alert('Impossibile contattare il server.');
        }
    });

    // --- Delete user ---
    async function deleteUtente(id, username) {
        if (!confirm(`Eliminare l'utente "${username}"?`)) return;
        try {
            const res = await fetch(`/api/utenti/${id}`, { method: 'DELETE' });
            const data = await res.json();
            if (data.ok) {
                loadUtenti();
            } else {
                alert('Errore: ' + (data.error || 'Eliminazione fallita.'));
            }
        } catch (err) {
            alert('Impossibile contattare il server.');
        }
    }

    // --- Init ---
    // pageshow fires also when the page is restored from bfcache
    window.addEventListener('pageshow', () => loadUtenti());
    loadUtenti();
</script>
<script src="/js/profile.js"></script>

</body>
</html>
